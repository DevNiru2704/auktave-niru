<!DOCTYPE html>
<html lang="en">
<head>

  <script>

      theme: {
        extend: {

  <style>
    * { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    /* Sidebar */
    .sidebar { transition: width 0.3s ease; }
    .sidebar-collapsed { width: 70px; }
    .sidebar-expanded { width: 260px; }
    .sidebar-text { transition: opacity 0.2s ease; }
    .sidebar-collapsed .sidebar-text { opacity: 0; display: none; }
    .sidebar-collapsed .sidebar-logo-text { opacity: 0; display: none; }
    
    /* Cards */
    .kpi-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    
    /* Table styles */
    .data-table { border-collapse: separate; border-spacing: 0; }
    .data-table th { position: sticky; top: 0; z-index: 10; }
    .data-table tbody tr { transition: background 0.15s ease; }
    .data-table tbody tr:hover { background: #f8fafc; }
    
    /* Status badges */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .badge-received { background: #dcfce7; color: #166534; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-partial { background: #dbeafe; color: #1e40af; }
    .badge-overdue { background: #fee2e2; color: #991b1b; }
    .badge-approved { background: #dcfce7; color: #166534; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }
    .badge-escalated { background: #f3e8ff; color: #6b21a8; }
    .badge-paid { background: #dcfce7; color: #166534; }
    .badge-active { background: #dbeafe; color: #1e40af; }
    .badge-verified { background: #dcfce7; color: #166534; }
    
    /* Progress bar */
    .progress-bar { height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    
    /* Form elements */
    .form-input:focus { outline: none; ring: 2px; ring-color: #3b82f6; border-color: #3b82f6; }
    
    /* Modal */
    .modal-backdrop { backdrop-filter: blur(4px); }
    
    /* Toast notifications */
    .toast { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* Loading spinner */
    .spinner { border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    /* Page transitions */
    .page-content { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Tooltip */
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      margin-left: 10px;
      padding: 4px 10px;
      background: #1e293b;
      color: white;
      font-size: 12px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 100;
    }
  </style>

<script>
// ============================================
// AUKTAVE 2026 Financial System - Frontend
// ============================================

// ─── CONFIGURATION ───
const CONFIG = {
  // Replace with your deployed Google Apps Script Web App URL
  API_BASE_URL: 'https://script.google.com/macros/s/AKfycbzW1Wnk1DnRxymYA6J9lySseBgxl467m62qTmF9C9OBmCkbAQffas6u6vVBkx3XCos6kQ/exec',
  ITEMS_PER_PAGE: 25
};

// ─── STATE MANAGEMENT ───
const state = {
  currentPage: 'dashboard',
  sidebarCollapsed: false,
  cache: {},
  currentData: [],
  filteredData: [],
  currentPageNum: 1,
  charts: {},
  editingId: null
};

// ─── INITIALIZATION ───
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { 
    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' 
  });
  
  // Check if API URL is configured
  if (!CONFIG.API_BASE_URL) {
    showApiConfigModal();
  } else {
    navigateTo('dashboard');
  }
});

// ─── NAVIGATION ───
function navigateTo(page) {
  state.currentPage = page;
  state.currentPageNum = 1;
  state.editingId = null;
  
  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.remove('bg-primary-600', 'text-white');
    el.classList.add('text-gray-300');
  });
  const activeNav = document.getElementById('nav-' + page);
  if (activeNav) {
    activeNav.classList.add('bg-primary-600', 'text-white');
    activeNav.classList.remove('text-gray-300');
  }
  
  // Update page title
  const titles = {
    dashboard: { title: 'Dashboard', subtitle: 'Overview of AUKTAVE 2026 finances' },
    income: { title: 'Income Management', subtitle: 'Track sponsorships and funding' },
    expenses: { title: 'Expense Management', subtitle: 'Monitor all expenditures' },
    committees: { title: 'Committee Budgets', subtitle: 'Budget allocation and utilization' },
    events: { title: 'Event Finances', subtitle: 'Event-wise financial tracking' },
    vendors: { title: 'Vendor Management', subtitle: 'Vendor payments and status' },
    approvals: { title: 'Approval Workflow', subtitle: 'Budget approval requests' },
    invoices: { title: 'Invoice Records', subtitle: 'Document and invoice management' },
    analytics: { title: 'Analytics & Reports', subtitle: 'Comprehensive financial analytics' }
  };
  
  const pageInfo = titles[page] || titles.dashboard;
  document.getElementById('page-title').textContent = pageInfo.title;
  document.getElementById('page-subtitle').textContent = pageInfo.subtitle;
  
  // Render page content
  const mainContent = document.getElementById('main-content');
  mainContent.innerHTML = '<div class="flex items-center justify-center h-64"><div class="spinner w-8 h-8"></div></div>';
  
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'income': renderIncome(); break;
    case 'expenses': renderExpenses(); break;
    case 'committees': renderCommittees(); break;
    case 'events': renderEvents(); break;
    case 'vendors': renderVendors(); break;
    case 'approvals': renderApprovals(); break;
    case 'invoices': renderInvoices(); break;
    case 'analytics': renderAnalytics(); break;
    default: renderDashboard();
  }
}

function toggleSidebar() {
  state.sidebarCollapsed = !state.sidebarCollapsed;
  const sidebar = document.getElementById('sidebar');
  if (state.sidebarCollapsed) {
    sidebar.classList.remove('sidebar-expanded');
    sidebar.classList.add('sidebar-collapsed');
  } else {
    sidebar.classList.remove('sidebar-collapsed');
    sidebar.classList.add('sidebar-expanded');
  }
}

function refreshCurrentPage() {
  state.cache = {}; // Clear cache
  navigateTo(state.currentPage);
  showToast('Data refreshed', 'success');
}

// ─── API COMMUNICATION ───

async function apiGet(action) {
  if (!CONFIG.API_BASE_URL) throw new Error('API URL not configured');
  
  const cacheKey = 'get_' + action;
  if (state.cache[cacheKey]) return state.cache[cacheKey];
  
  try {
    const response = await fetch(`${CONFIG.API_BASE_URL}?action=${action}`);
    const text = await response.text();
    let result;
    try {
      result = JSON.parse(text);
    } catch(parseErr) {
      throw new Error('Invalid response from server: ' + text.substring(0, 100));
    }
    if (!result.success) throw new Error(result.error);
    state.cache[cacheKey] = result.data;
    updateConnectionStatus(true);
    return result.data;
  } catch(error) {
    console.error('API GET Error:', error);
    updateConnectionStatus(false);
    throw error;
  }
}

async function apiPost(action, data) {
  if (!CONFIG.API_BASE_URL) throw new Error('API URL not configured');
  
  try {
    const response = await fetch(CONFIG.API_BASE_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, ...data })
    });
    const text = await response.text();
    let result;
    try {
      result = JSON.parse(text);
    } catch(parseErr) {
      throw new Error('Invalid response from server: ' + text.substring(0, 100));
    }
    if (!result.success) throw new Error(result.error || JSON.stringify(result));
    state.cache = {}; // Clear cache on mutation
    updateConnectionStatus(true);
    return result.data;
  } catch(error) {
    console.error('API POST Error:', error);
    updateConnectionStatus(false);
    throw error;
  }
}

function updateConnectionStatus(connected) {
  const el = document.getElementById('connection-status');
  if (connected) {
    el.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-50 text-green-700 text-sm';
    el.innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span><span class="font-medium">Connected</span>';
  } else {
    el.className = 'flex items-center gap-2 px-3 py-1.5 rounded-full bg-red-50 text-red-700 text-sm';
    el.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span><span class="font-medium">Error</span>';
  }
}

// ─── UI COMPONENTS ───

function showToast(message, type = 'success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  
  const colors = {
    success: 'bg-green-500',
    error: 'bg-red-500',
    warning: 'bg-amber-500',
    info: 'bg-blue-500'
  };
  
  const icons = {
    success: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
    error: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',

// ─── FORMATTING UTILITIES ───

function formatCurrency(amount) {
  const num = parseFloat(amount) || 0;
  return '₹' + num.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatNumber(num) {
  return parseFloat(num).toLocaleString('en-IN');
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

function getStatusBadge(status) {
  const statusMap = {
    'Received': 'badge-received',
    'Pending': 'badge-pending',
    'Partial': 'badge-partial',
    'Overdue': 'badge-overdue',
    'Approved': 'badge-approved',
    'Rejected': 'badge-rejected',
    'Escalated': 'badge-escalated',
    'Paid': 'badge-paid',
    'Active': 'badge-active',
    'Verified': 'badge-verified',
    'Reimbursed': 'badge-approved'
  };
  const className = statusMap[status] || 'badge-pending';
  return `<span class="badge ${className}">${status || 'Pending'}</span>`;
}

function getProgressBar(percent, color = 'bg-primary-500') {
  const pct = Math.min(100, Math.max(0, parseFloat(percent) || 0));
  let barColor = color;
  if (pct > 90) barColor = 'bg-red-500';
  else if (pct > 75) barColor = 'bg-amber-500';
  
  return `
    <div class="flex items-center gap-2">
      <div class="progress-bar flex-1"><div class="progress-fill ${barColor}" style="width: ${pct}%"></div></div>
      <span class="text-xs text-gray-500 w-10 text-right">${pct.toFixed(1)}%</span>
    </div>
  `;
}

// ─── PAGINATION ───

function paginateData(data) {
  const totalPages = Math.ceil(data.length / CONFIG.ITEMS_PER_PAGE);
  const start = (state.currentPageNum - 1) * CONFIG.ITEMS_PER_PAGE;
  const paginated = data.slice(start, start + CONFIG.ITEMS_PER_PAGE);
  return { data: paginated, totalPages, totalItems: data.length };
}

function renderPagination(totalPages, containerId) {
  if (totalPages <= 1) return '';
  
  let html = '<div class="flex items-center justify-between mt-4 px-2">';
  html += `<span class="text-sm text-gray-500">Page ${state.currentPageNum} of ${totalPages}</span>`;
  html += '<div class="flex items-center gap-2">';
  
  html += `<button onclick="changePage(${state.currentPageNum - 1})" ${state.currentPageNum === 1 ? 'disabled' : ''} 
    class="px-3 py-1.5 rounded-lg border border-gray-200 text-sm ${state.currentPageNum === 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-50'}">Previous</button>`;
  
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= state.currentPageNum - 1 && i <= state.currentPageNum + 1)) {
      html += `<button onclick="changePage(${i})" 
        class="px-3 py-1.5 rounded-lg text-sm font-medium ${i === state.currentPageNum ? 'bg-primary-600 text-white' : 'text-gray-600 hover:bg-gray-50'}">${i}</button>`;
    } else if (i === state.currentPageNum - 2 || i === state.currentPageNum + 2) {
      html += '<span class="text-gray-400 px-1">...</span>';
    }
  }
  
  html += `<button onclick="changePage(${state.currentPageNum + 1})" ${state.currentPageNum === totalPages ? 'disabled' : ''} 
    class="px-3 py-1.5 rounded-lg border border-gray-200 text-sm ${state.currentPageNum === totalPages ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-gray-50'}">Next</button>`;
  
  html += '</div></div>';
  return html;
}

function changePage(page) {
  state.currentPageNum = page;
  // Re-render current page data
  switch(state.currentPage) {
    case 'income': renderIncomeTable(); break;
    case 'expenses': renderExpensesTable(); break;
    case 'vendors': renderVendorsTable(); break;
    case 'approvals': renderApprovalsTable(); break;
    case 'invoices': renderInvoicesTable(); break;
  }
}

// ─── SEARCH & FILTER ───

function setupSearchFilter(searchId, filterIds, dataKey, renderFn) {
  const searchEl = document.getElementById(searchId);
  if (searchEl) {
    searchEl.addEventListener('input', debounce(() => {
      applyFilters(dataKey, filterIds, renderFn);
    }, 300));
  }
  
  filterIds.forEach(fid => {
    const el = document.getElementById(fid);
    if (el) {
      el.addEventListener('change', () => applyFilters(dataKey, filterIds, renderFn));
    }
  });
}

function applyFilters(dataKey, filterIds, renderFn) {
  let data = state.currentData || [];
  
  // Apply search (first filterIds entry IS the search input)
  const searchEl = document.getElementById(filterIds[0]);
  const search = searchEl ? searchEl.value.toLowerCase() : '';
  if (search) {
    data = data.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(search)));
  }
  
  // Apply select filters (remaining filterIds after search)
  for (let i = 1; i < filterIds.length; i++) {
    const el = document.getElementById(filterIds[i]);
    if (el && el.value) {
      const filterField = el.dataset.filterField;
      if (filterField) {
        data = data.filter(row => String(row[filterField]) === el.value);
      }
    }
  }
  
  state.filteredData = data;
  state.currentPageNum = 1;
  renderFn();
}

function debounce(fn, ms) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), ms);
  };
}

// ─── MODAL FORM BUILDER ───

function buildForm(fields, values = {}, title = '', submitFn = '') {
  let html = `
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold text-gray-900">${title}</h3>
        <button onclick="closeModal()" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="modal-form" onsubmit="event.preventDefault(); ${submitFn};" class="space-y-4">
  `;
  
  fields.forEach(field => {
    const value = values[field.name] || '';
    html += '<div>';
    html += `<label class="block text-sm font-medium text-gray-700 mb-1">${field.label}${field.required ? ' <span class="text-red-500">*</span>' : ''}</label>`;
    
    if (field.type === 'select') {
      html += `<select name="${field.name}" ${field.required ? 'required' : ''} class="form-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">`;
      html += `<option value="">Select ${field.label}</option>`;
      field.options.forEach(opt => {
        html += `<option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>`;
      });
      html += '</select>';
    } else if (field.type === 'textarea') {
      html += `<textarea name="${field.name}" ${field.required ? 'required' : ''} rows="3" 
        class="form-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">${value}</textarea>`;
    } else {
      html += `<input type="${field.type || 'text'}" name="${field.name}" value="${value}" ${field.required ? 'required' : ''} 
        placeholder="${field.placeholder || ''}" 
        class="form-input w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm">`;
    }
    
    html += '</div>';
  });
  
  html += `
      <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
        <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">Cancel</button>
        <button type="submit" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors text-sm font-medium">Save</button>
      </div>
    </form></div>
  `;
  
  return html;
}

function getFormData(formId) {
  const form = document.getElementById(formId);
  const data = {};
  new FormData(form).forEach((value, key) => {
    data[key] = value;
  });
  return data;
}

function renderVendorsTableHTML(data) {
  const paginated = paginateData(state.filteredData || data);
  
  let html = `
    <table class="data-table w-full text-sm">
      <thead>
        <tr class="bg-gray-50 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
          <th class="px-4 py-3">Vendor Name</th>
          <th class="px-4 py-3">Service Type</th>
          <th class="px-4 py-3">Committee</th>
          <th class="px-4 py-3 text-right">Total Amount</th>
          <th class="px-4 py-3 text-right">Paid</th>
          <th class="px-4 py-3 text-right">Pending</th>
          <th class="px-4 py-3">Due Date</th>
          <th class="px-4 py-3">Contact</th>
          <th class="px-4 py-3">Status</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
  `;
  
  if (paginated.data.length === 0) {
    html += `<tr><td colspan="9" class="px-4 py-8 text-center text-gray-400">No vendors found</td></tr>`;
  }
  
  paginated.data.forEach(v => {
    const pending = parseFloat(v['Pending Amount']) || 0;
    const total = parseFloat(v['Total Amount']) || 0;
    const paidPercent = total > 0 ? ((parseFloat(v['Paid Amount']) || 0) / total) * 100 : 0;
    
    html += `
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-3 font-medium text-gray-900">${v['Vendor Name'] || '-'}</td>
        <td class="px-4 py-3 text-gray-500">${v['Service Type'] || '-'}</td>
        <td class="px-4 py-3 text-gray-500">${v['Committee'] || '-'}</td>
        <td class="px-4 py-3 text-right font-medium">${formatCurrency(v['Total Amount'])}</td>
        <td class="px-4 py-3 text-right text-green-600">${formatCurrency(v['Paid Amount'])}</td>
        <td class="px-4 py-3 text-right ${pending > 0 ? 'text-amber-600 font-medium' : 'text-gray-400'}">${formatCurrency(v['Pending Amount'])}</td>
        <td class="px-4 py-3 whitespace-nowrap">${formatDate(v['Due Date'])}</td>
        <td class="px-4 py-3 text-gray-500 text-xs">${v['Contact Info'] || '-'}</td>
        <td class="px-4 py-3">${getStatusBadge(v['Status'])}</td>
      </tr>
    `;
  });
  
  html += '</tbody></table>';
  return html;
}

        </div>
        <h3 class="text-lg font-semibold text-gray-900 mb-2">Failed to load analytics</h3>
        <p class="text-sm text-gray-500 mb-4">${error.message}</p>
        <button onclick="renderAnalytics()" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 text-sm font-medium">Retry</button>
      </div>
    `;
  }
}

function renderAnalyticsCharts(data) {
  // Destroy existing charts
  Object.values(state.charts).forEach(c => c.destroy());
  state.charts = {};
  
  const chartColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#84cc16', '#f97316', '#ec4899', '#14b8a6'];
  
  // 1. Expense by Category (Doughnut)
  const catCtx = document.getElementById('analyticsCategoryChart');
  if (catCtx && data.expenseByCategory && data.expenseByCategory.length > 0) {
    state.charts.analyticsCategory = new Chart(catCtx, {
      type: 'doughnut',
      data: {
        labels: data.expenseByCategory.map(d => d.label),
        datasets: [{
          data: data.expenseByCategory.map(d => d.value),
          backgroundColor: chartColors,
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { padding: 15, font: { size: 12 }, usePointStyle: true } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${formatCurrency(ctx.raw)}` } }
        }
      }
    });
  }
  
  // 2. Income by Source (Pie)
  const incCtx = document.getElementById('analyticsIncomeChart');
  if (incCtx && data.incomeBySource && data.incomeBySource.length > 0) {
    state.charts.analyticsIncome = new Chart(incCtx, {
      type: 'pie',
      data: {
        labels: data.incomeBySource.map(d => d.label),
        datasets: [{
          data: data.incomeBySource.map(d => d.value),
          backgroundColor: ['#10b981', '#3b82f6', '#f59e0b'],
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { padding: 15, font: { size: 12 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${formatCurrency(ctx.raw)}` } }
        }
      }
    });
  }
  
  // 3. Sponsorship Tiers (Polar Area)
  const tierCtx = document.getElementById('analyticsTierChart');
  if (tierCtx && data.sponsorshipTiers && data.sponsorshipTiers.length > 0) {
    state.charts.analyticsTier = new Chart(tierCtx, {
      type: 'polarArea',
      data: {
        labels: data.sponsorshipTiers.map(d => d.label),
        datasets: [{
          data: data.sponsorshipTiers.map(d => d.value),
          backgroundColor: chartColors.map(c => c + '80'),
          borderColor: chartColors,
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { padding: 10, font: { size: 11 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${formatCurrency(ctx.raw)}` } }
        },
        scales: {
          r: { ticks: { callback: v => '₹' + (v/1000).toFixed(0) + 'K' } }
        }
      }
    });
  }
  
  // 4. Payment Status Distribution (Doughnut)
  const payCtx = document.getElementById('analyticsPaymentChart');
  if (payCtx && data.paymentStatusDist && data.paymentStatusDist.length > 0) {
    state.charts.analyticsPayment = new Chart(payCtx, {
      type: 'doughnut',
      data: {
        labels: data.paymentStatusDist.map(d => d.label),
        datasets: [{
          data: data.paymentStatusDist.map(d => d.value),
          backgroundColor: ['#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'],
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: { position: 'bottom', labels: { padding: 15, font: { size: 12 } } }
        }
      }
    });
  }
  
  // 5. Cash Flow Timeline (Line)
  const cfCtx = document.getElementById('analyticsCashFlowChart');
  if (cfCtx && data.cashFlowTimeline && data.cashFlowTimeline.length > 0) {
    state.charts.analyticsCashFlow = new Chart(cfCtx, {
      type: 'line',
      data: {
        labels: data.cashFlowTimeline.map(d => {
          const [y, m] = d.month.split('-');
          return new Date(y, m-1).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        }),
        datasets: [
          { label: 'Income', data: data.cashFlowTimeline.map(d => d.income), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4, pointRadius: 4, pointHoverRadius: 6 },
          { label: 'Expense', data: data.cashFlowTimeline.map(d => d.expense), borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.4, pointRadius: 4, pointHoverRadius: 6 },
          { label: 'Net', data: data.cashFlowTimeline.map(d => d.income - d.expense), borderColor: '#3b82f6', backgroundColor: 'transparent', borderDash: [5, 5], tension: 0.4, pointRadius: 3 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
          y: { grid: { color: '#f1f5f9' }, ticks: { callback: v => '₹' + (v/1000).toFixed(0) + 'K' } }
        },
        plugins: {
          legend: { position: 'top', labels: { usePointStyle: true, padding: 20 } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.raw)}` } }
        }
      }
    });
  }
  
  // 6. Committee Utilization (Horizontal Bar)
  const comCtx = document.getElementById('analyticsCommitteeChart');
  if (comCtx && data.committeeSpending && data.committeeSpending.length > 0) {
    state.charts.analyticsCommittee = new Chart(comCtx, {
      type: 'bar',
      data: {
        labels: data.committeeSpending.map(d => d.label.length > 15 ? d.label.substring(0, 15) + '...' : d.label),
        datasets: [
          { label: 'Spent', data: data.committeeSpending.map(d => d.spent), backgroundColor: '#ef4444', borderRadius: 4 },
          { label: 'Remaining', data: data.committeeSpending.map(d => Math.max(0, d.remaining)), backgroundColor: '#10b981', borderRadius: 4 }
        ]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { grid: { color: '#f1f5f9' }, ticks: { callback: v => '₹' + (v/1000).toFixed(0) + 'K' } },
          y: { grid: { display: false }, ticks: { font: { size: 11 } } }
        },
        plugins: {
          legend: { position: 'top', labels: { usePointStyle: true } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.raw)}` } }
        }
      }
    });
  }
  
  // 7. Top Vendors (Horizontal Bar)
  const venCtx = document.getElementById('analyticsVendorChart');
  if (venCtx && data.topVendors && data.topVendors.length > 0) {
    state.charts.analyticsVendor = new Chart(venCtx, {
      type: 'bar',
      data: {
        labels: data.topVendors.map(d => d.name.length > 20 ? d.name.substring(0, 20) + '...' : d.name),
        datasets: [
          { label: 'Total Amount', data: data.topVendors.map(d => d.total), backgroundColor: '#3b82f6', borderRadius: 4 },
          { label: 'Paid', data: data.topVendors.map(d => d.paid), backgroundColor: '#10b981', borderRadius: 4 },
          { label: 'Pending', data: data.topVendors.map(d => d.pending), backgroundColor: '#f59e0b', borderRadius: 4 }
        ]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { grid: { color: '#f1f5f9' }, ticks: { callback: v => '₹' + (v/1000).toFixed(0) + 'K' } },
          y: { grid: { display: false }, ticks: { font: { size: 11 } } }
        },
        plugins: {
          legend: { position: 'top', labels: { usePointStyle: true } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.raw)}` } }
        }
      }
    });
  }
}
</script>
</body>
</html>
